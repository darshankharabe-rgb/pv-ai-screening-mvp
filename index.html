<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PV Lit Screen | AI</title>
    <style>
        :root {
            --bg-main: #0a0a0a;
            --bg-card: #111111;
            --border: #27272a;
            --text-main: #ededed;
            --text-muted: #a1a1aa;
            --accent: #ffffff;
            --highlight: #2563eb;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-main);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 600px;
            padding: 2rem;
        }

        .header {
            margin-bottom: 2rem;
        }

        .header h1 {
            font-size: 1.5rem;
            font-weight: 600;
            margin: 0 0 0.5rem 0;
            letter-spacing: -0.02em;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin: 0;
        }

        .card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1.5rem;
            box-shadow: 0 4px 24px rgba(0,0,0,0.2);
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        label {
            display: block;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-bottom: 0.4rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        input, textarea {
            width: 100%;
            box-sizing: border-box;
            background-color: var(--bg-main);
            border: 1px solid var(--border);
            color: var(--text-main);
            padding: 0.75rem;
            border-radius: 6px;
            font-family: inherit;
            font-size: 0.9rem;
            transition: border-color 0.2s;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--text-muted);
        }

        textarea {
            resize: vertical;
            min-height: 120px;
            line-height: 1.5;
        }

        button {
            width: 100%;
            background-color: var(--accent);
            color: var(--bg-main);
            border: none;
            padding: 0.75rem;
            border-radius: 6px;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Results Section */
        #results {
            margin-top: 1.5rem;
            display: none;
            border-top: 1px solid var(--border);
            padding-top: 1.5rem;
        }

        .code-block {
            background-color: var(--bg-main);
            border: 1px solid var(--border);
            padding: 1rem;
            border-radius: 6px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            font-size: 0.85rem;
            color: #10b981; /* Default to a terminal green/blue */
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .status-relevant { color: #ef4444; } /* Red for ADRs */
        .status-not-relevant { color: #10b981; } /* Green for safe */
        .status-uncertain { color: #f59e0b; } /* Yellow for human review */
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h1>PV Literature Screening</h1>
            <p>Gemini 1.5 Flash • Automated ICSR Detection</p>
        </div>

        <div class="card">
            <form id="screenForm">
                <div class="form-group">
                    <label>Drug Name</label>
                    <input type="text" id="drug" placeholder="e.g., Ibuprofen" required>
                </div>
                <div class="form-group">
                    <label>Article Title</label>
                    <input type="text" id="title" placeholder="Title of the publication" required>
                </div>
                <div class="form-group">
                    <label>Abstract</label>
                    <textarea id="abstract" placeholder="Paste the full abstract text here..." required></textarea>
                </div>
                <button type="submit" id="submitBtn">Run AI Screening</button>
            </form>

            <div id="results">
                <label>AI Verdict Output</label>
                <div class="code-block" id="jsonOutput"></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('screenForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const resultsDiv = document.getElementById('results');
            const outputBlock = document.getElementById('jsonOutput');
            
            // Set loading state
            btn.textContent = "Analyzing abstract...";
            btn.disabled = true;
            resultsDiv.style.display = 'none';

            // Gather data
            const payload = {
                drug_name: document.getElementById('drug').value,
                title: document.getElementById('title').value,
                abstract: document.getElementById('abstract').value
            };

            try {
                // Call your local FastAPI server
                const response = await fetch("http://127.0.0.1:8000/screen", {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    const errData = await response.json().catch(() => ({}));
                    throw new Error(errData.detail || "Server error. Is Uvicorn running?");
                }

                const data = await response.json();
                
                // Parse the Gemini JSON string inside the result
                // Gemini sometimes wraps JSON in ```json blocks, we strip that here just in case
                let cleanJson = data.result.replace(/```json/g, '').replace(/```/g, '').trim();
                let parsedVerdict = JSON.parse(cleanJson);

                // Display formatting
                outputBlock.textContent = JSON.stringify(parsedVerdict, null, 2);
                
                // Add some basic color coding based on the verdict
                outputBlock.className = 'code-block'; // Reset
                if(parsedVerdict.verdict === "RELEVANT") outputBlock.classList.add('status-relevant');
                if(parsedVerdict.verdict === "NOT_RELEVANT") outputBlock.classList.add('status-not-relevant');
                if(parsedVerdict.verdict === "UNCERTAIN") outputBlock.classList.add('status-uncertain');

                resultsDiv.style.display = 'block';

            } catch (error) {
                alert("Error connecting to API: " + error.message);
            } finally {
                btn.textContent = "Run AI Screening";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
